<!--
  EVIDENT TECHNOLOGIES LLC — Institutional Shield Mark (color).
  Parent-company seal. Symbolizes record integrity, verification, and preservation.
  Motif: institutional shield · ledger/record lines · verification check.
  Palette: Deep Navy field · Constitutional Ivory record lines · Muted Gold verification.
  Scales cleanly to a 16px favicon. Do not add detail below this geometry.
-->
<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Evident Technologies"
     width="512" height="512" viewBox="0 0 96 96">
  <title>Evident Technologies</title>
  <desc>Institutional shield mark with ledger record lines and a verification check.</desc>

  <!-- Shield field -->
  <path d="M28,16 L68,16 Q74,16 74,22 L74,50 C74,67 62,76 48,82 C34,76 22,67 22,50 L22,22 Q22,16 28,16 Z"
        fill="#15294C"/>

  <!-- Inner hairline border (procedural frame) -->
  <path d="M31,20 L65,20 Q70.5,20 70.5,25.5 L70.5,49.5 C70.5,64.5 60,72.5 48,77.8 C36,72.5 25.5,64.5 25.5,49.5 L25.5,25.5 Q25.5,20 31,20 Z"
        fill="none" stroke="#BF9F4E" stroke-width="1" stroke-opacity="0.45"/>

  <!-- Record / ledger lines -->
  <line x1="34" y1="35" x2="62" y2="35" stroke="#F4EFE3" stroke-width="3.1" stroke-linecap="round" stroke-opacity="0.92"/>
  <line x1="38" y1="42" x2="58" y2="42" stroke="#F4EFE3" stroke-width="3.1" stroke-linecap="round" stroke-opacity="0.55"/>

  <!-- Verification check -->
  <path d="M38,54 L46,62 L60,46" fill="none" stroke="#BF9F4E" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
