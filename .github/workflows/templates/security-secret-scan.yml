#
# Reusable: security-secret-scan
# Scans for leaked secrets, API keys, and credentials.
# SHA-pinned actions per action-pins.json.

name: Security Secret Scan

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version (for custom scan scripts)"
        required: false
        default: "24"
        type: string
      scan-script:
        description: "Path to custom secret scan script (optional)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret Leak Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}

      - name: Determine diff range
        id: range
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              RANGE="$AFTER^..$AFTER"
            else
              RANGE="$BEFORE..$AFTER"
            fi
          fi
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"

      - name: Run secret scan
        run: |
          if [ -n "${{ inputs.scan-script }}" ] && [ -f "${{ inputs.scan-script }}" ]; then
            node ${{ inputs.scan-script }} --diff-range "${{ steps.range.outputs.range }}"
          else
            # Default: grep for common secret patterns in changed lines
            git diff --diff-filter=ACM --name-only ${{ steps.range.outputs.range }} 2>/dev/null | while read -r file; do
              if [ -f "$file" ]; then
                git diff ${{ steps.range.outputs.range }} -- "$file" 2>/dev/null | grep -nEi \
                  '(AKIA[0-9A-Z]{16}|sk_live_[0-9a-zA-Z]{24,}|sk_test_[0-9a-zA-Z]{24,}|-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----|ghp_[0-9a-zA-Z]{36}|gho_[0-9a-zA-Z]{36}|github_pat_[0-9a-zA-Z_]{82}|eyJ[A-Za-z0-9_-]*\.eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*|supabase_[A-Za-z0-9]{40,})' \
                  && echo "::error file=$file::Potential secret detected" && exit 1
              done
            done || true
            echo "Secret scan completed."
          fi
