name: CI Static App

on:
  push:
    paths:
      - '**/package.json'
      - '**/src/**'
  pull_request:
    paths:
      - '**/package.json'
      - '**/src/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm ci
      - name: Check Dependency Boundaries
        run: bash ./scripts/check-dependencies.sh
      - name: Check Version Governance
        run: |
          VERSIONS_URL="https://raw.githubusercontent.com/Evident-Technologies/.github/main/versions.json"
          curl -sSf "$VERSIONS_URL" -o central-versions.json
          node - <<'EOF'
          const fs = require('fs');
          const prodPkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
          const central = JSON.parse(fs.readFileSync('central-versions.json', 'utf-8'));
          const deps = prodPkg.dependencies || {};
          const mismatches = [];
          for (const [pkg, expected] of Object.entries(central)) {
            if (deps[pkg] && deps[pkg] !== expected) {
              mismatches.push(`${pkg}: expected ${expected}, found ${deps[pkg]}`);
            }
          }
          if (mismatches.length) {
            console.error('Version governance violations:');
            mismatches.forEach(m => console.error(' - ' + m));
            process.exit(1);
          } else {
            console.log('Version governance check passed.');
          }
          EOF
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Run Visual Governance
        run: bash ../../scripts/run-visual-governance.sh
      - name: Performance Check
        run: bash ../../scripts/performance-check.sh
      - name: Validate Deploy Manifest
        run: node ../../packages/deploy-manifest/src/validate.js ./deploy-manifest.json
      - name: Deploy (Static)
        run: echo "Deploy placeholder – integrate Cloudflare Pages or Vercel"
