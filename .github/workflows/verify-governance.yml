# Reusable: verify-governance (canonical entrypoint)
# GitHub requires reusable workflows at the top level of .github/workflows/.
# This file is the canonical entrypoint; the templates/ version contains
# the full implementation and is kept for organizational consistency.

name: Verify Governance

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        required: false
        default: "24"
        type: string
      governance-path:
        description: "Path to governance directory"
        required: false
        default: "_governance"
        type: string
      custom-validate-command:
        description: "Custom governance validation command (optional)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  validate:
    name: Governance Validation
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check governance layer presence
        run: |
          set -euo pipefail
          GOV_PATH="${{ inputs.governance-path }}"

          # Check for governance directory
          if [ ! -d "$GOV_PATH" ]; then
            echo "::warning::Governance directory '$GOV_PATH' not found. Skipping governance validation."
            exit 0
          fi

          # Check for required governance files
          MISSING=0
          for FILE in GOVERNANCE.md IP_POLICY.md LICENSE; do
            if [ ! -f "$GOV_PATH/$FILE" ] && [ ! -f "$FILE" ]; then
              echo "::warning::Required governance file '$FILE' not found."
              MISSING=$((MISSING + 1))
            else
              echo "✅ Found: $FILE"
            fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "::warning::$MISSING governance file(s) missing. See governance doctrine for requirements."
          fi

          echo "Governance layer validation complete."

      - name: Setup Node.js
        if: inputs.custom-validate-command != ''
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ inputs.node-version }}

      - name: Run custom governance validation
        if: inputs.custom-validate-command != ''
        run: ${{ inputs.custom-validate-command }}
